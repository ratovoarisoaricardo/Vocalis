<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vocalis Translator</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; width: 250px; background: #f0f2f5; margin: 0; }
    h3 { margin-top: 0; color: #25D366; text-align: center; }
    label { font-size: 14px; color: #54656f; font-weight: bold; }
    select, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
    button { background: #25D366; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #128C7E; }
    .footer { text-align: center; margin-top: 15px; font-size: 11px; color: #8696a0; }
  </style>
</head>
<body>
  <h3>Vocalis Translator</h3>
  <label for="targetLang">Traduire vers :</label>
  <select id="targetLang">
    <option value="fr">Français</option>
    <option value="en">Anglais</option>
    <option value="es">Espagnol</option>
    <option value="de">Allemand</option>
    <option value="it">Italien</option>
    <option value="pt">Portugais</option>
    <option value="ar">Arabe</option>
    <option value="zh-CN">Chinois</option>
  </select>
  <button id="saveBtn">Enregistrer</button>
  <p id="status" style="font-size: 12px; color: #128C7E; display: none; text-align: center; font-weight: bold; margin-top: 10px;">Langue sauvegardée !</p>
  <div class="footer">Pour WhatsApp Web</div>
  <script src="popup.js"></script>
</body>
</html>
